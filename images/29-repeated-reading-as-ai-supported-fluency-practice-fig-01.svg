<title id="fig-title-01">Automaticity: working-memory reallocation — 29-repeated-reading-as-ai-supported-fluency-practice</title>
<desc>Under heavy decoding load a child's working memory is mostly consumed by decoding, leaving little for comprehension; after repeated reading with error feedback automatizes decoding, capacity is released and comprehension expands.</desc>
