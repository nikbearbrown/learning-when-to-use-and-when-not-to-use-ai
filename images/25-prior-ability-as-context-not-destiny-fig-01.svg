<title id="fig-title-01">The algorithmic Matthew effect loop and its exit — 25-prior-ability-as-context-not-destiny</title>
<desc>An adaptive platform initialized on prior score serves easier content, generates less growth, and reads that as confirmation — a self-sealing loop that opens only through a structured exit (human override plus scheduled re-estimation).</desc>
