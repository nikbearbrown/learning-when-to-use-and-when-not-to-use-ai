<title id="fig-title-02">The self-regulation control loop — 04-augmentation-with-a-metacognitive-gate</title>
<desc>Metacognition is a closed control cycle — set goal, attempt, monitor, adjust, evaluate — and the learner must run every segment, or an external regulator runs the loop while the learner's capacity atrophies.</desc>
