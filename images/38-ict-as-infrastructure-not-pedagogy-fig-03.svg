<title id="fig-title-03">The two-ledger structure — 38-ict-as-infrastructure-not-pedagogy</title>
<desc>Infrastructure and pedagogy are kept on two separate ledgers — infrastructure judged on a utility standard (uptime, cost, coverage, accessibility), pedagogy judged on mechanism and learning — and no contract may force the ledgers to merge.</desc>
