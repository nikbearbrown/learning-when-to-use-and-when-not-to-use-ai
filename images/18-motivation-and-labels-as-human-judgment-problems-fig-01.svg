<title id="fig-title-01">Expectancy feedback loop: open vs. closed — 18-motivation-and-labels-as-human-judgment-problems</title>
<desc>A teacher prediction allocates rigor and wait time, the student reads it and adjusts effort, the outcome confirms or challenges the prediction. A label converts the open loop (updated by evidence) into a closed one (reinforced regardless).</desc>
