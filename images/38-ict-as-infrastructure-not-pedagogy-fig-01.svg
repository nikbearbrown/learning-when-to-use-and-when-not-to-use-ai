<title id="fig-title-01">The three channels of technology's contribution — 38-ict-as-infrastructure-not-pedagogy</title>
<desc>Technology contributes through three indirect channels — access (binary, utility standard, equity instrument), amplification (the effect belongs to the mechanism, not the device), and displacement (every device-hour replaces something) — and a bundle prevents separate evaluation.</desc>
