<title id="fig-title-03">The amplification-vs-substitution phase gate — 93-hattie-ai-analysis-summary</title>
<desc>A high-impact learning influence meets a phase gate. If AI amplifies the mechanism (feedback, practice, diagnosis, planning, reflection), the effect is preserved. If AI substitutes for the cognitive or social work that produces the effect, the effect collapses.</desc>
