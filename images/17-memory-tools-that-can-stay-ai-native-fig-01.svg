<title id="fig-title-01">The three-part memory engineering model — 17-memory-tools-that-can-stay-ai-native</title>
<desc>Memory for arbitrary material has three parts — encoding structure (AI-manufactured, received), retrieval effort (learner-only), and spacing schedule (AI-automated). Because the machine's and learner's work differ, there is no cognitive-work conflict.</desc>
