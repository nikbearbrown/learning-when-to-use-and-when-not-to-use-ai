<title id="fig-title-03">The listening economy, before and after — 29-repeated-reading-as-ai-supported-fluency-practice</title>
<desc>Before AI, the teacher's scarce listening time is spread thin across all 26 children; after, AI listens to the 18 stronger readers while the teacher concentrates on the 8 lowest — expanding the listening economy rather than replacing its human share.</desc>
