<title id="fig-title-01">Where the variance lives: between vs. within schools — 37-school-effects-as-system-context</title>
<desc>Only on the order of ten to twenty percent of achievement variance lies between schools; the large majority lies within them — the empirical basis for treating school effects as a context to read rather than a lever to pull.</desc>
